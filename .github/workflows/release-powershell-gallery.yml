name: Release to PowerShell Gallery

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to PowerShell Gallery
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install PowerShell tooling
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Test-ModuleManifest -Path ./src/PwshXDRSpectre.psd1 | Out-Null

      - name: Run PSScriptAnalyzer (errors only)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $analysisTargets = @(
            './src/PwshXDRSpectre.psm1',
            './src/Public',
            './src/Private'
          )

          $findings = Invoke-ScriptAnalyzer -Path $analysisTargets -Recurse -Severity Error
          if ($findings) {
            $findings | Format-Table -AutoSize
            throw "PSScriptAnalyzer reported $($findings.Count) error-level finding(s)."
          }

      - name: Run Pester test suite
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $config = New-PesterConfiguration
          $config.Run.Path = './src/Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  package:
    name: Package Module Artifact
    runs-on: ubuntu-latest
    needs:
      - quality
    outputs:
      module-version: ${{ steps.version.outputs.module-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve and validate version
        id: version
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $manifest = Test-ModuleManifest -Path ./src/PwshXDRSpectre.psd1
          $moduleVersion = $manifest.Version.ToString()

          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagVersion = $env:GITHUB_REF.Substring('refs/tags/v'.Length)
            if ($tagVersion -ne $moduleVersion) {
              throw "Tag version v$tagVersion does not match manifest version $moduleVersion."
            }
          }

          "module-version=$moduleVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify required asset exists in source
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $requiredAssetPath = './src/ANSI Shadow.flf'
          if (-not (Test-Path -Path $requiredAssetPath -PathType Leaf)) {
            throw "Required module asset is missing: $requiredAssetPath"
          }

      - name: Build distributable archive
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          New-Item -ItemType Directory -Path ./artifacts/package -Force | Out-Null

          Copy-Item -Path ./src -Destination ./artifacts/package/PwshXDRSpectre -Recurse -Force
          $requiredPackagedAssetPath = './artifacts/package/PwshXDRSpectre/ANSI Shadow.flf'
          if (-not (Test-Path -Path $requiredPackagedAssetPath -PathType Leaf)) {
            throw "Required module asset was not copied into package directory: $requiredPackagedAssetPath"
          }

          $archiveName = 'PwshXDRSpectre.${{ steps.version.outputs.module-version }}.zip'
          $archivePath = "./artifacts/$archiveName"
          Compress-Archive -Path ./artifacts/package/PwshXDRSpectre -DestinationPath $archivePath -Force

          $verificationPath = './artifacts/verify'
          New-Item -ItemType Directory -Path $verificationPath -Force | Out-Null
          Expand-Archive -Path $archivePath -DestinationPath $verificationPath -Force

          $requiredArchivedAssetPath = './artifacts/verify/PwshXDRSpectre/ANSI Shadow.flf'
          if (-not (Test-Path -Path $requiredArchivedAssetPath -PathType Leaf)) {
            throw "Required module asset was not present in archive: $requiredArchivedAssetPath"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: pwshxdrspectre-package
          path: artifacts/*.zip
          if-no-files-found: error

  publish:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    needs:
      - quality
      - package
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.publish)

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Publish module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets['PSGALLERY_API_KEY'] }}
        run: |
          Set-StrictMode -Version Latest

          if (-not $env:PSGALLERY_API_KEY) {
            throw 'Missing PSGALLERY_API_KEY secret.'
          }

          Publish-Module -Path ./src -Repository PSGallery -NuGetApiKey $env:PSGALLERY_API_KEY -ErrorAction Stop
