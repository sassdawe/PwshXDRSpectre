name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Validate Manifest, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install PowerShell tooling
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Validate module manifest
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Test-ModuleManifest -Path ./src/PwshXDRSpectre.psd1 | Out-Null

      - name: Run PSScriptAnalyzer (errors only)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $analysisTargets = @(
            './src/PwshXDRSpectre.psm1',
            './src/Public',
            './src/Private'
          )

          $findings = Invoke-ScriptAnalyzer -Path $analysisTargets -Recurse -Severity Error
          if ($findings) {
            $findings | Format-Table -AutoSize
            throw "PSScriptAnalyzer reported $($findings.Count) error-level finding(s)."
          }

      - name: Run Pester test suite
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null

          $config = New-PesterConfiguration
          $config.Run.Path = './src/Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './artifacts/pester-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: pester-results
          path: artifacts/pester-results.xml
          if-no-files-found: error
